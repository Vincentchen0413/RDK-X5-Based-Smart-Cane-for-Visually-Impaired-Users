# prepare_conversion.py 会根据 ONNX 绝对路径和输入尺寸生成正式 workspace/config.yaml。
model_parameters:
  onnx_model: '/ABSOLUTE/PATH/smart_cane_yolov8n_v1_rdk.onnx'
  march: 'bayes-e'
  layer_out_dump: False
  working_dir: '/ABSOLUTE/PATH/workspace/bpu_model_output'
  output_model_file_prefix: 'smart_cane_yolov8n_v1_rdk_bayese_640x640_nv12'

input_parameters:
  input_name: ''
  input_type_rt: 'nv12'
  input_type_train: 'rgb'
  input_layout_train: 'NCHW'
  norm_type: 'data_scale'
  scale_value: 0.003921568627451

calibration_parameters:
  cal_data_dir: '/ABSOLUTE/PATH/workspace/calibration_data_rgb_f32'
  cal_data_type: 'float32'
  calibration_type: 'default'
  optimization: 'set_Softmax_input_int8,set_Softmax_output_int8'

compiler_parameters:
  jobs: 2
  compile_mode: 'latency'
  debug: true
  optimize_level: 'O3'
